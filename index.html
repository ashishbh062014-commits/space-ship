<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Space Survivor</title>

<style>
body{
margin:0;
overflow:hidden;
background:black;
font-family:Arial,sans-serif;
}

canvas{
display:block;
background:linear-gradient(#000015,#000000);
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
font-size:24px;
}
</style>
</head>

<body>

<div id="ui">
Score: <span id="score">0</span><br>
Lives: <span id="lives">3</span>
</div>

<canvas id="game"></canvas>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

const ship={
x:canvas.width/2,
y:canvas.height-100,
w:40,
h:60,
speed:7
};

let keys={};
let meteors=[];
let stars=[];
let score=0;
let lives=3;

document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

function spawnMeteor(){
meteors.push({
x:Math.random()*canvas.width,
y:-40,
r:20+Math.random()*20,
speed:3+Math.random()*4
});
}

function spawnStar(){
stars.push({
x:Math.random()*canvas.width,
y:-20,
r:10,
speed:4
});
}

setInterval(spawnMeteor,700);
setInterval(spawnStar,1800);

function circleRect(cx,cy,r,rx,ry,rw,rh){
let testX=cx;
let testY=cy;

if(cx<rx)testX=rx;
else if(cx>rx+rw)testX=rx+rw;

if(cy<ry)testY=ry;
else if(cy>ry+rh)testY=ry+rh;

let distX=cx-testX;
let distY=cy-testY;

return distX*distX+distY*distY<r*r;
}

function drawShip(){
ctx.fillStyle="cyan";
ctx.beginPath();
ctx.moveTo(ship.x,ship.y);
ctx.lineTo(ship.x-20,ship.y+60);
ctx.lineTo(ship.x+20,ship.y+60);
ctx.closePath();
ctx.fill();

ctx.fillStyle="orange";
ctx.fillRect(ship.x-5,ship.y+60,10,12);
}

function update(){

ctx.clearRect(0,0,canvas.width,canvas.height);

if(keys["ArrowLeft"]||keys["a"]) ship.x-=ship.speed;
if(keys["ArrowRight"]||keys["d"]) ship.x+=ship.speed;
if(keys["ArrowUp"]||keys["w"]) ship.y-=ship.speed;
if(keys["ArrowDown"]||keys["s"]) ship.y+=ship.speed;

ship.x=Math.max(20,Math.min(canvas.width-20,ship.x));
ship.y=Math.max(20,Math.min(canvas.height-80,ship.y));

drawShip();

ctx.fillStyle="gray";

for(let i=meteors.length-1;i>=0;i--){

let m=meteors[i];

m.y+=m.speed;

ctx.beginPath();
ctx.arc(m.x,m.y,m.r,0,Math.PI*2);
ctx.fill();

if(circleRect(m.x,m.y,m.r,ship.x-20,ship.y,40,60)){
meteors.splice(i,1);
lives--;
document.getElementById("lives").textContent=lives;

if(lives<=0){
alert("Game Over! Score: "+score);
location.reload();
}
continue;
}

if(m.y>canvas.height+50) meteors.splice(i,1);

}

ctx.fillStyle="yellow";

for(let i=stars.length-1;i>=0;i--){

let s=stars[i];

s.y+=s.speed;

ctx.beginPath();
ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
ctx.fill();

if(circleRect(s.x,s.y,s.r,ship.x-20,ship.y,40,60)){
score+=10;
document.getElementById("score").textContent=score;
stars.splice(i,1);
continue;
}

if(s.y>canvas.height) stars.splice(i,1);

}

requestAnimationFrame(update);

}

update();

</script>

</body>
</html>
